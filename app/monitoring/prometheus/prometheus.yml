global:
  scrape_interval: 15s
  scrape_timeout: 15s
  external_labels:
    project: paycore
    environment: dev


alerting:
  alertmanagers:
    - static_configs:
        - targets: []


rule_files:
  - "alerts.yml"
          

scrape_configs:
  - job_name: fastapi
    static_configs:
      - targets: ["api:8000"]

    metrics_path: /metrics

    scrape_interval: 10s

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

    
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
    

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]